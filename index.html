	function pushPrechatFields() {

        "product_name": "Daxko Operations", 
        "daxko_account_id": "3011687",
        "sf_account_id": "0014u00001nMj5dAAC",
        "username_email": "tom.cruise@abc.com",
        "first_name": "Tom", 
        "last_name": "Cruise",

      }; // pass more params
			console.log("Prechat fields sent:", preChatFields);

			embeddedservice_bootstrap.settings.storageDomain = "github.com";
			embeddedservice_bootstrap.init(

				{
					scrt2URL: 'https://daxkoneworg--uat.sandbox.my.salesforce-scrt.com'
				}
			);

			window.addEventListener("onEmbeddedMessagingReady", () => {
           		pushPrechatFields();
       		});
			window.addEventListener('onEmbeddedMessagingConversationStarted', function (event) {
				console.log('Conversation started: ', event);
			});
			window.addEventListener('onEmbeddedMessageSent', function (event) {
				console.log('Conversation onEmbeddedMessageSent: ', event);
			});
		} catch (err) {

</script>
