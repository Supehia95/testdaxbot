<!DOCTYPE html>
<html>
<head>
  <title>My  Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
</head>
<body style="margin:0">
  <div class="desktopsize">
     Web Chat Setup 
    <div> <button onclick="doCallAgentforce()"> Start Chat</button> </div>
  </div>
  
</body>
</html>
<script type='text/javascript'>
 
 









	
	function pushPrechatFields() {
		try {
		  if (window.embeddedservice_bootstrap?.prechatAPI?.setHiddenPrechatFields) {
		  
			const preChatFields = {
				"SourceUrl":window.location.href,
				"Product_Name": "Daxko_Operations",  // Name of the product  Daxko_Operations , Zen_Planner,Zen_Planner_Engage 
				"Daxko_Account_ID": "3011687",  // Daxko Account Id
				"SF_Account_ID": "0014u00001nMj5dAAC", // Daxko Salesforce Account Id 
				"UserName_Email": "tom.cruise@abc.com", // User email/username
				"First_Name": "Tom",  // First name
				"Last_Name": "Cruise", //  Last Name
				"Phone_Number": "+1111111111",  // Phone number
				"Root_Partition_ID": "root Id"  // Root partition id
       
      }; // pass more params
			  
			console.log("Prechat fields sent:", preChatFields);
			embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields(preChatFields);
		  }
		} catch (e) {
		  console.warn("Prechat push failed:", e);
		}
	}

	
	function initEmbeddedMessaging() {
		try {
			embeddedservice_bootstrap.settings.language = 'en_US'; // For example, enter 'en' or 'en-US'
			embeddedservice_bootstrap.init(
				'00DWC000008gYyL',
				'Daxko_Chat',
				'https://daxkoneworg--uat.sandbox.my.site.com/ESWDaxkoChat1780643769559',
				{
					scrt2URL: 'https://daxkoneworg--uat.sandbox.my.salesforce-scrt.com'
				}
			);

			window.addEventListener("onEmbeddedMessagingReady", () => {
				console.log('abc ready');
				hideWidget();
           		pushPrechatFields();
       		});
			window.addEventListener('onEmbeddedMessagingConversationStarted', function (event) {
				console.log('Conversation started: ', event);
			});
			window.addEventListener('onEmbeddedMessageSent', function (event) {
				console.log('Conversation onEmbeddedMessageSent: ', event);
			});
			window.addEventListener('onEmbeddedMessagingWindowClosed', function (event) {
				console.log('Conversation onEmbeddedMessagingWindowClosed: ', event);
				hideWidget();
			});
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
	function doCallAgentforce() {
           
    showWidget();
    embeddedservice_bootstrap.utilAPI.launchChat();
		
}


	function showWidget() {
		document.getElementById('embedded-messaging')?.classList.remove('visible');

	}
	function hideWidget() {
		document.getElementById('embedded-messaging')?.classList.add('visible');

	}
	
</script>
<script type='text/javascript' src='https://daxkoneworg--uat.sandbox.my.site.com/ESWDaxkoChat1780643769559/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

		.embeddedMessagingConversationButtonWrapper .embeddedMessagingConversationButton {
	    visibility: hidden;
	}

	.visible {
	    visibility: hidden !important;
	}

</style>
